version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: linkflow-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: LinkFlow
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-secret-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      # SQLite for local dev; swap for PostgreSQL in production:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./linkflow.db}
      CORS_ORIGINS: '["http://localhost:3000"]'
      BASE_URL: http://localhost:8000
    volumes:
      - ./Backend:/app          # hot-reload in dev
      - linkflow_db:/app/data   # persistent SQLite
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: linkflow-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./precision-flow:/app
    command: sh -c "npm install && npm start"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  linkflow_db:
